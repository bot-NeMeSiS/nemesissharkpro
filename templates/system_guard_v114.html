
{% extends "base.html" %}
{% block content %}
<div class="v114-home">
  <section class="v114-hero-main compact">
    <div>
      <p class="v114-kicker">V114 · SYSTEM GUARD</p>
      <h1>Control general</h1>
      <p>{{ status.message }}</p>
    </div>
    <div class="v114-score">{{ status.score }}/100</div>
  </section>

  <section class="v114-panel">
    <h2>Checks</h2>
    {% for c in status.checks %}
    <div class="v114-row">
      <span>{{ c.name }}</span>
      <strong>{{ "OK" if c.ok else "FALTA" }}</strong>
    </div>
    {% endfor %}
  </section>
</div>
{% endblock %}
