<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeMeSiS · Command Center</title>
  <style>
    :root{--bg:#050914;--panel:rgba(12,22,45,.82);--panel2:rgba(18,32,65,.72);--text:#eef6ff;--muted:#9fb3d4;--blue:#19a8ff;--gold:#f5c451;--hot:#ff4d6d;--ok:#28e7a6;--line:rgba(255,255,255,.10);--r:24px}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#113c78 0,#071226 34%,#030712 78%);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--text);min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--blue),#11295b);display:grid;place-items:center;box-shadow:0 0 34px rgba(25,168,255,.35);font-weight:900}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a,.btn{color:var(--text);text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.06);padding:10px 13px;border-radius:999px;font-size:13px}.hero{border:1px solid var(--line);background:linear-gradient(135deg,rgba(25,168,255,.16),rgba(245,196,81,.08));border-radius:32px;padding:26px;margin-bottom:18px;box-shadow:0 20px 70px rgba(0,0,0,.35)}.eyebrow{color:var(--gold);font-weight:800;letter-spacing:.12em;font-size:12px}.hero h1{font-size:clamp(30px,5vw,58px);line-height:.98;margin:10px 0}.hero p{color:var(--muted);font-size:17px;max-width:760px}.score{display:inline-flex;align-items:center;gap:10px;background:rgba(40,231,166,.10);border:1px solid rgba(40,231,166,.22);padding:10px 14px;border-radius:999px;color:#bfffe8;font-weight:800}.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}.metric b{font-size:22px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.grid{display:grid;grid-template-columns:1.35fr .65fr;gap:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}.card:before{content:"";position:absolute;inset:-1px auto auto -1px;width:5px;height:100%;background:linear-gradient(var(--blue),transparent)}.card.hot:before{background:linear-gradient(var(--hot),var(--gold))}.card.watch:before{background:linear-gradient(var(--gold),var(--blue))}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.pill{border:1px solid var(--line);padding:7px 10px;border-radius:999px;color:var(--muted);font-size:12px}.priority{font-size:38px;font-weight:950}.cards{display:grid;gap:12px}.decision{font-weight:900;color:var(--gold)}.muted{color:var(--muted)}.actions{display:grid;gap:10px}.actions a{display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:var(--text);background:rgba(255,255,255,.055);border:1px solid var(--line);padding:13px;border-radius:17px}.loading{color:var(--muted);padding:20px}@media(max-width:860px){.grid,.strip{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.wrap{padding:14px}.hero{padding:20px;border-radius:24px}}
  </style>
</head>
<body><div class="wrap"><div class="top"><div class="brand"><div class="logo">🦈</div><div><b>NeMeSiS SHARK PRO</b><div class="muted">Command Center Cliente</div></div></div><div class="nav"><a href="/cliente/experiencia">Mi día</a><a href="/cliente/live-visual">Live</a><a href="/cliente/match-center-premium">Match Center</a><a href="/cliente/dashboard">Mi cuenta</a></div></div><main id="app" class="loading">Cargando centro de mando premium…</main></div>
<script>
const app=document.getElementById('app');
function tone(cls){cls=(cls||'').toLowerCase(); if(cls.includes('hot'))return 'hot'; if(cls.includes('watch'))return 'watch'; return ''}
fetch('/api/v320/client-command-center').then(r=>r.json()).then(d=>{
 const strip=(d.command_strip||[]).map(x=>`<div class="metric"><b>${x.value||''}</b><span>${x.label||''}</span></div>`).join('');
 const cards=(d.command_cards||[]).map(c=>`<article class="card ${tone((c.decision||{}).tone)}"><div class="row"><div><span class="pill">#${c.rank||''} · ${c.status||''}</span><h2>${c.title||''}</h2><div class="decision">${(c.decision||{}).label||''}</div><p class="muted">${c.headline||''}</p><p>${c.reason||''}</p><a class="btn" href="${c.href||'#'}">${c.primary_action||'Abrir'} →</a></div><div class="priority">${c.priority||0}</div></div></article>`).join('');
 const actions=(d.smart_actions||[]).map(a=>`<a href="${a.href||'#'}"><span>${a.label||''}</span><span>→</span></a>`).join('');
 const principles=(d.experience_principles||[]).map(p=>`<li>${p}</li>`).join('');
 app.className=''; app.innerHTML=`<section class="hero"><div class="eyebrow">${d.name||'V320'}</div><h1>${d.headline||''}</h1><p>${d.subheadline||''}</p><div class="score">Score experiencia: ${d.command_score||0}/100 · API 0</div></section><section class="strip">${strip}</section><section class="grid"><div class="cards">${cards}</div><aside class="card"><h2>Acciones inteligentes</h2><div class="actions">${actions}</div><h3>Principios V320</h3><ul class="muted">${principles}</ul></aside></section>`;
}).catch(e=>{app.innerHTML='<div class="card"><h1>Command Center seguro</h1><p class="muted">La vista carga en modo seguro sin consumir API.</p><a class="btn" href="/cliente/dashboard">Volver a mi cuenta</a></div>'});
</script></body></html>
