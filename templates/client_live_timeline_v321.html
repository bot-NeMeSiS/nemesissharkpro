<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NeMeSiS · Live Timeline</title>
<style>
:root{--bg:#050914;--panel:rgba(10,20,42,.84);--panel2:rgba(18,32,65,.70);--text:#eef6ff;--muted:#9fb3d4;--blue:#19a8ff;--gold:#f5c451;--hot:#ff4d6d;--ok:#28e7a6;--line:rgba(255,255,255,.10);--r:24px}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#0e3b78 0,#061126 40%,#02050d 82%);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--text)}.wrap{max-width:1180px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--blue),#102759);display:grid;place-items:center;box-shadow:0 0 34px rgba(25,168,255,.35);font-weight:900}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a,.btn{color:var(--text);text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.06);padding:10px 13px;border-radius:999px;font-size:13px}.hero{border:1px solid var(--line);background:linear-gradient(135deg,rgba(25,168,255,.18),rgba(245,196,81,.08));border-radius:32px;padding:26px;margin-bottom:18px;box-shadow:0 24px 70px rgba(0,0,0,.38)}.eyebrow{color:var(--gold);font-weight:900;letter-spacing:.13em;font-size:12px}.hero h1{font-size:clamp(30px,5vw,58px);line-height:.98;margin:10px 0}.hero p{color:var(--muted);font-size:17px;max-width:790px}.score{display:inline-flex;background:rgba(40,231,166,.10);border:1px solid rgba(40,231,166,.24);padding:10px 14px;border-radius:999px;color:#bfffe8;font-weight:900}.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}.metric b{font-size:25px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.grid{display:grid;grid-template-columns:1.35fr .65fr;gap:16px}.timeline{position:relative;display:grid;gap:12px}.event{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 18px 62px;overflow:hidden}.event:before{content:"";position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(var(--blue),transparent)}.dot{position:absolute;left:18px;top:22px;width:22px;height:22px;border-radius:50%;background:var(--blue);box-shadow:0 0 22px rgba(25,168,255,.5)}.event.hot .dot{background:var(--hot);box-shadow:0 0 28px rgba(255,77,109,.55)}.event.watch .dot{background:var(--gold);box-shadow:0 0 28px rgba(245,196,81,.45)}.event.safe .dot{background:var(--ok)}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.pill{border:1px solid var(--line);padding:7px 10px;border-radius:999px;color:var(--muted);font-size:12px}.impact{font-size:36px;font-weight:950}.decision{font-weight:950;color:var(--gold)}.muted{color:var(--muted)}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}.actions{display:grid;gap:10px}.actions a{display:flex;justify-content:space-between;color:var(--text);text-decoration:none;background:rgba(255,255,255,.055);border:1px solid var(--line);padding:13px;border-radius:17px}.loading{color:var(--muted);padding:20px}@media(max-width:860px){.grid,.strip{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.wrap{padding:14px}.hero{padding:20px;border-radius:24px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><div class="logo">🦈</div><div><b>NeMeSiS SHARK PRO</b><div class="muted">Live Timeline · Turning Points</div></div></div><div class="nav"><a href="/cliente/command-center">Command Center</a><a href="/cliente/experiencia">Mi día</a><a href="/cliente/live-visual">Live</a><a href="/cliente/dashboard">Mi cuenta</a></div></div><main id="app" class="loading">Cargando timeline live premium…</main></div>
<script>
const app=document.getElementById('app');
function tone(t){t=(t||'').toLowerCase(); if(t.includes('hot'))return 'hot'; if(t.includes('watch'))return 'watch'; if(t.includes('safe'))return 'safe'; return ''}
fetch('/api/v321/live-timeline').then(r=>r.json()).then(d=>{
 const strip=(d.timeline_strip||[]).map(x=>`<div class="metric"><b>${x.value||''}</b><span>${x.label||''}</span></div>`).join('');
 const events=(d.events||[]).map(e=>`<article class="event ${tone(e.tone)}"><div class="dot"></div><div class="row"><div><span class="pill">Min ${e.minute||'-'} · ${e.event_type||''} · ${e.data_health||''}</span><h2>${e.title||''}</h2><div class="decision">${(e.decision||{}).label||''}</div><p class="muted">${e.summary||''}</p><p>${e.why_it_matters||''}</p><a class="btn" href="${e.href||'#'}">${e.action_label||'Abrir'} →</a></div><div class="impact">${e.impact||0}</div></div></article>`).join('');
 const tps=(d.turning_points||[]).map(e=>`<a href="${e.href||'#'}"><span>${e.title||''}</span><span>${e.impact||0}</span></a>`).join('') || '<p class="muted">Sin puntos críticos ahora mismo.</p>';
 const principles=(d.experience_principles||[]).map(p=>`<li>${p}</li>`).join('');
 app.className=''; app.innerHTML=`<section class="hero"><div class="eyebrow">${d.name||'V321'}</div><h1>${d.headline||''}</h1><p>${d.subheadline||''}</p><div class="score">Timeline score: ${d.timeline_score||0}/100 · API 0</div></section><section class="strip">${strip}</section><section class="grid"><div class="timeline">${events}</div><aside class="card"><h2>Turning points</h2><div class="actions">${tps}</div><h3>${(d.recap||{}).title||'Recap'}</h3><p class="muted">${(d.recap||{}).text||''}</p><a class="btn" href="${(d.recap||{}).best_href||'/cliente/command-center'}">${(d.recap||{}).best_next_step||'Seguir'} →</a><h3>Principios V321</h3><ul class="muted">${principles}</ul></aside></section>`;
}).catch(()=>{app.innerHTML='<div class="card"><h1>Timeline seguro</h1><p class="muted">Vista segura sin consumir API.</p><a class="btn" href="/cliente/command-center">Volver al Command Center</a></div>'});
</script></body></html>
