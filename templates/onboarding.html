{% extends 'base.html' %}
{% block content %}
<section class="v153-onboarding">
  <div class="v153-onboarding-head">
    <span>Onboarding cliente</span>
    <h1>Configura tu experiencia SHARK</h1>
    <p>Esto ajusta cómo ves señales, riesgo, favoritos y avisos. Sin datos inventados: si no hay feed real, verás estado vacío premium.</p>
  </div>
  <form method="post" class="v153-onboarding-grid">
    <label class="v153-choice"><span>1</span><strong>Riesgo</strong><select name="risk_preference"><option value="conservador">Conservador · menos exposición</option><option value="medio" selected>Medio · equilibrio</option><option value="agresivo">Agresivo · cuotas más altas</option></select></label>
    <label class="v153-choice"><span>2</span><strong>Deporte principal</strong><select name="favorite_sport"><option value="futbol" selected>Fútbol</option><option value="basket">Basket</option><option value="todos">Todos</option></select></label>
    <label class="v153-choice"><span>3</span><strong>Competición favorita</strong><input name="favorite_competition" placeholder="Ej: LaLiga, Champions, Mundial"></label>
    <div class="v153-onboarding-actions"><a href="/cliente/pro">Saltar por ahora</a><button>Guardar y entrar al panel</button></div>
  </form>
</section>
{% endblock %}
