<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NeMeSiS · SHARK Copilot Live</title>
<style>
:root{--bg:#040813;--panel:rgba(8,18,39,.86);--panel2:rgba(17,32,66,.72);--text:#eef6ff;--muted:#9fb3d4;--blue:#18a8ff;--gold:#f8c95a;--hot:#ff4778;--ok:#28e7a6;--line:rgba(255,255,255,.11);--r:24px}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,#113e83 0,#07142b 38%,#02050d 82%);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--text)}.wrap{max-width:1180px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,var(--blue),#102759);display:grid;place-items:center;box-shadow:0 0 36px rgba(24,168,255,.36);font-weight:950}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a,.btn{color:var(--text);text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.065);padding:10px 13px;border-radius:999px;font-size:13px}.hero{border:1px solid var(--line);background:linear-gradient(135deg,rgba(24,168,255,.20),rgba(248,201,90,.10));border-radius:34px;padding:28px;margin-bottom:18px;box-shadow:0 26px 80px rgba(0,0,0,.42);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:240px;height:240px;border-radius:50%;background:rgba(24,168,255,.18);filter:blur(8px);animation:pulse 2.6s infinite alternate}.eyebrow{color:var(--gold);font-weight:950;letter-spacing:.13em;font-size:12px}.hero h1{font-size:clamp(30px,5vw,58px);line-height:.98;margin:10px 0;max-width:850px}.hero p{color:var(--muted);font-size:17px;max-width:820px}.score{display:inline-flex;background:rgba(40,231,166,.10);border:1px solid rgba(40,231,166,.24);padding:10px 14px;border-radius:999px;color:#bfffe8;font-weight:950}.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}.metric b{font-size:25px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.grid{display:grid;grid-template-columns:1.08fr .92fr;gap:16px}.card,.insight{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 18px 48px rgba(0,0,0,.28)}.insight{position:relative;overflow:hidden}.insight.hot{border-color:rgba(255,71,120,.45);box-shadow:0 0 42px rgba(255,71,120,.12),0 18px 48px rgba(0,0,0,.28)}.insight.watch{border-color:rgba(248,201,90,.38)}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.pill{border:1px solid var(--line);padding:7px 10px;border-radius:999px;color:var(--muted);font-size:12px}.scorebig{font-size:44px;font-weight:950}.verdict{font-weight:950;color:var(--gold);letter-spacing:.03em}.muted{color:var(--muted)}.feed{display:grid;gap:12px}.chat{display:grid;gap:10px}.bubble{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:20px;padding:14px}.bubble b{color:var(--gold)}.actions{display:grid;gap:10px}.actions a{display:flex;justify-content:space-between;color:var(--text);text-decoration:none;background:rgba(255,255,255,.055);border:1px solid var(--line);padding:13px;border-radius:17px}.loading{color:var(--muted);padding:20px}@keyframes pulse{from{transform:scale(.96);opacity:.45}to{transform:scale(1.08);opacity:.9}}@media(max-width:860px){.grid,.strip{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.wrap{padding:14px}.hero{padding:20px;border-radius:24px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><div class="logo">🦈</div><div><b>NeMeSiS SHARK PRO</b><div class="muted">SHARK AI · Live Copilot</div></div></div><div class="nav"><a href="/cliente/live-timeline">Timeline</a><a href="/cliente/command-center">Command Center</a><a href="/cliente/experiencia">Mi día</a><a href="/cliente/dashboard">Mi cuenta</a></div></div><main id="app" class="loading">Cargando SHARK AI Live Copilot…</main></div>
<script>
const app=document.getElementById('app');
function cls(t){t=(t||'').toLowerCase(); if(t.includes('hot'))return 'hot'; if(t.includes('watch'))return 'watch'; return ''}
fetch('/api/v322/shark-copilot').then(r=>r.json()).then(d=>{
 const strip=(d.status_strip||[]).map(x=>`<div class="metric"><b>${x.value||''}</b><span>${x.label||''}</span></div>`).join('');
 const top=d.primary_insight||{};
 const insights=(d.insights||[]).map(i=>`<article class="insight ${cls(i.tone)}"><div class="row"><div><span class="pill">${i.changed||'Contexto'} · ${i.source||'SHARK'}</span><h2>${i.title||''}</h2><div class="verdict">${i.verdict||''}</div><p class="muted">${i.explanation||''}</p><p>${i.why||''}</p><a class="btn" href="${i.href||'#'}">${i.next_step||'Abrir'} →</a></div><div class="scorebig">${i.score||0}</div></div></article>`).join('');
 const chats=(d.conversation_cards||[]).map(c=>`<div class="bubble"><b>${c.role||''} · ${c.label||''}</b><p class="muted">${c.text||''}</p></div>`).join('');
 const actions=(d.smart_actions||[]).map(a=>`<a href="${a.href||'#'}"><span>${a.label||''}</span><span>→</span></a>`).join('');
 const principles=(d.experience_principles||[]).map(p=>`<li>${p}</li>`).join('');
 app.className=''; app.innerHTML=`<section class="hero"><div class="eyebrow">${d.name||'V322'}</div><h1>${d.headline||''}</h1><p>${d.subheadline||''}</p><div class="score">Copilot score: ${d.copilot_score||0}/100 · API 0</div></section><section class="strip">${strip}</section><section class="grid"><div class="feed"><article class="insight ${cls(top.tone)}"><span class="pill">Insight principal</span><h2>${top.title||''}</h2><div class="verdict">${top.verdict||''}</div><p class="muted">${top.explanation||''}</p><p>${top.why||''}</p><a class="btn" href="${top.href||'/cliente/live-timeline'}">${top.next_step||'Abrir'} →</a></article>${insights}</div><aside class="card"><h2>Conversación SHARK</h2><div class="chat">${chats}</div><h2>Acciones rápidas</h2><div class="actions">${actions}</div><h3>Memoria preparada</h3><p class="muted">Eventos vistos: ${(d.memory_seed||{}).watched_events||0} · Turning points: ${(d.memory_seed||{}).turning_points||0} · ML: ${(d.memory_seed||{}).ready_for_ml?'preparado':'pendiente'}</p><h3>Principios V322</h3><ul class="muted">${principles}</ul></aside></section>`;
}).catch(()=>{app.innerHTML='<div class="card"><h1>SHARK Copilot seguro</h1><p class="muted">Vista segura sin consumir API.</p><a class="btn" href="/cliente/live-timeline">Volver al Timeline</a></div>'});
</script></body></html>
