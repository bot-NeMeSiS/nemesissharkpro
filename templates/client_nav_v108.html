
<div class="v108-client-nav">
  <div class="v108-brand">
    <div class="v108-logo">🦈</div>
    <div>
      <strong>SHARK PRO</strong>
      <span>Panel cliente</span>
    </div>
  </div>

  <nav>
    {% for item in payload.navigation %}
      <a href="{{ item.href }}"><span>{{ item.icon }}</span>{{ item.label }}</a>
    {% endfor %}
  </nav>

  <div class="v108-account-actions">
    {% for item in payload.account_actions %}
      <a class="{{ 'danger' if item.danger else '' }}" href="{{ item.href }}"><span>{{ item.icon }}</span>{{ item.label }}</a>
    {% endfor %}
  </div>
</div>
