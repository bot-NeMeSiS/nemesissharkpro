
{% extends 'base.html' %}
{% block content %}
<section class="auth">
  <div class="auth-card">
    <p class="eyebrow">Zona privada</p>
    <h1>Acceso interno</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" class="form">
      <input name="username" type="text" placeholder="Usuario admin" required autofocus>
      <input name="password" type="password" placeholder="Contraseña admin" required>
      <button class="btn primary">Entrar</button>
    </form>
  </div>
</section>
{% endblock %}
