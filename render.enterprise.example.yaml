
services:
  - type: web
    name: nemesis-shark-pro-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120
    envVars:
      - key: V80_ENTERPRISE_SCALE_ENABLED
        value: true
      - key: V80_WORKER_LOOP
        value: false
      - key: PERFORMANCE_SAFE_MODE
        value: true
      - key: STABILITY_HARD_MODE
        value: true

