services:
  - type: web
    name: nemesis-shark-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 3 --worker-class gthread --timeout 90 --graceful-timeout 25 --keep-alive 3 --max-requests 600 --max-requests-jitter 80
    envVars:
      - key: DB_PATH
        value: /data/database.db
      - key: OPENAI_MODEL
        value: gpt-4o-mini
